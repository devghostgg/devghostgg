name: Update stats

on:
  schedule: # execute every 7 days
    - cron: "0 0 */7 * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Jobs to update datas
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
    
      - name: Create dist folder
        run: mkdir dist

      # Snake Animation
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark
            dist/github-snake-light.svg?palette=github-light
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}

      # Stats card
      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=github_dark&locale=en&count_private=true&include_all_commits=true
          path: dist/stats.svg
          token: ${{ secrets.PAT }}

      # Top langs card
      - name: Generate top-langs card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&theme=github_dark&locale=en&layout=compact&count_private=true
          path: dist/top-langs.svg
          token: ${{ secrets.PAT }}

      - name: Push cards to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
